<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incentivos DISTRILECO - LACTALIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .progress-bar { transition: width 0.5s ease-in-out; }
        .card-vendedor:hover { transform: translateY(-3px); transition: 0.3s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-white shadow-sm border-b p-4 mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl font-black text-blue-900 tracking-tighter">DISTRILECO</span>
                <span class="text-gray-300 text-xl">|</span>
                <span class="text-xl font-bold text-blue-600 italic">LACTALIS</span>
            </div>
            <div class="text-right">
                <p id="fecha-actual" class="text-xs text-gray-500 font-medium"></p>
                <p class="text-sm font-bold text-blue-800">Sede Caucasia</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="md:col-span-2 bg-blue-900 rounded-2xl p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-sm uppercase tracking-widest opacity-80 font-bold">Venta Global Compañía</h2>
                    <div class="flex items-baseline space-x-2 mt-2">
                        <span id="total-vendido-global" class="text-6xl font-black">0</span>
                        <span class="text-xl opacity-60">/ 700 Cajas</span>
                    </div>
                    <div class="w-full bg-blue-800 rounded-full h-4 mt-4 overflow-hidden border border-blue-700">
                        <div id="barra-global" class="progress-bar bg-green-400 h-full" style="width: 0%"></div>
                    </div>
                </div>
                <i class="fas fa-chart-line absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
            </div>

            <div class="bg-white rounded-2xl p-6 border-2 border-blue-100 shadow-sm flex flex-col justify-center text-center">
                <h3 class="text-gray-500 text-xs font-bold uppercase mb-2">Incentivo Supervisor</h3>
                <p id="bono-sup-valor" class="text-3xl font-black text-green-600">$0</p>
                <p class="text-[10px] text-gray-400 mt-2 italic">Aplica desde las 595 cajas (85%)</p>
            </div>
        </div>

        <div id="contenedor-vendedores" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

        <div class="fixed bottom-6 right-6 flex flex-col space-y-3">
            <button onclick="exportarExcel()" class="bg-white border-2 border-green-600 text-green-600 w-14 h-14 rounded-full shadow-xl hover:bg-green-50 flex items-center justify-center transition-all">
                <i class="fas fa-file-excel text-xl"></i>
            </button>
            <button onclick="enviarWhatsApp()" class="bg-green-500 text-white w-14 h-14 rounded-full shadow-xl hover:bg-green-600 flex items-center justify-center transition-all">
                <i class="fab fa-whatsapp text-2xl"></i>
            </button>
        </div>
    </main>

    <script>
        const META_GLOBAL = 700;
        const UMBRAL_SUPERVISOR = 595; 
        const VALOR_CAJA_SUP = 1000;

        const vendedores = [
            { n: "Danny", c: 194 }, { n: "Alexander", c: 155 },
            { n: "Juan Quintana", c: 179 }, { n: "Lorenzo", c: 80 },
            { n: "Roy", c: 45 }, { n: "Argenis", c: 25 },
            { n: "Ruben Avendaño", c: 12 }, { n: "Juan Zabala", c: 10 }
        ];

        let ventas = JSON.parse(localStorage.getItem('v_lactalis_dist')) || {};

        function init() {
            render();
            setInterval(updateTime, 1000);
            updateTime();
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('fecha-actual').innerText = now.toLocaleString('es-CO', { 
                timeZone: 'America/Bogota', dateStyle: 'medium', timeStyle: 'medium' 
            });
        }

        function render() {
            const container = document.getElementById('contenedor-vendedores');
            container.innerHTML = '';
            let totalG = 0;

            vendedores.forEach(v => {
                const actual = ventas[v.n] || 0;
                totalG += actual;
                const pct = ((actual / v.c) * 100).toFixed(1);
                const cumpleMin = actual >= (v.c * 0.85);

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 card-vendedor">
                        <div class="flex justify-between items-start mb-3">
                            <span class="font-bold text-gray-700 text-sm uppercase">${v.n}</span>
                            ${cumpleMin ? '<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">ALCANZADO</span>' : '<span class="text-[10px] bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full uppercase italic">En Proceso</span>'}
                        </div>
                        <div class="flex items-center justify-between mb-2">
                            <input type="number" value="${actual}" onchange="save('${v.n}', this.value)" 
                                class="w-20 text-xl font-bold text-blue-600 bg-blue-50 border-none rounded-lg p-1 text-center focus:ring-2 focus:ring-blue-400 outline-none">
                            <div class="text-right">
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Meta: ${v.c}</p>
                                <p class="text-xs font-black text-blue-900">${pct}%</p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: ${Math.min(pct, 100)}%"></div>
                        </div>
                    </div>
                `;
            });

            let bonoSup = 0;
            if (totalG >= UMBRAL_SUPERVISOR) {
                bonoSup = (totalG - UMBRAL_SUPERVISOR) * VALOR_CAJA_SUP;
            }

            document.getElementById('total-vendido-global').innerText = totalG;
            document.getElementById('barra-global').style.width = `${Math.min((totalG/META_GLOBAL)*100, 100)}%`;
            document.getElementById('bono-sup-valor').innerText = `$${bonoSup.toLocaleString('es-CO')}`;
        }

        function save(n, v) {
            ventas[n] = parseInt(v) || 0;
            localStorage.setItem('v_lactalis_dist', JSON.stringify(ventas));
            render();
        }

        function enviarWhatsApp() {
            let t = 0;
            let msg = `*DISTRILECO - LACTALIS (CAUCASIA)*\n`;
            msg += `🕒 ${new Date().toLocaleString('es-CO')}\n`;
            msg += `----------------------------\n`;
            
            vendedores.forEach(v => {
                const act = ventas[v.n] || 0;
                t += act;
                const p = ((act/v.c)*100).toFixed(1);
                const status = act >= (v.c*0.85) ? '✅' : '⏳';
                msg += `${status} *${v.n}*: ${act}/${v.c} (${p}%)\n`;
            });

            const bonoSup = t >= 595 ? (t - 595) * 1000 : 0;
            msg += `----------------------------\n`;
            msg += `📦 *TOTAL ACUMULADO:* ${t} cajas\n`;
            msg += `💰 *BONO SUPERVISOR:* $${bonoSup.toLocaleString('es-CO')}\n`;
            msg += `📞 WhatsApp: 3117700431`;

            window.open(`https://wa.me/573117700431?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function exportarExcel() {
            const data = vendedores.map(v => ({
                VENDEDOR: v.n,
                META: v.c,
                VENTA: ventas[v.n] || 0,
                PORCENTAJE: (((ventas[v.n] || 0)/v.c)*100).toFixed(1) + '%',
                BONO_3000: (ventas[v.n] || 0) >= (v.c * 0.85) ? 'SÍ' : 'NO'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Incentivos");
            XLSX.writeFile(wb, "Reporte_Lactalis_Caucasia.xlsx");
        }

        init();
    </script>
</body>
</html>
